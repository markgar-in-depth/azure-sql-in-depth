<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1600px;
    height: 2560px;
    overflow: hidden;
    background: #2a4080;
    font-family: 'DM Sans', sans-serif;
  }

  .cover {
    width: 1600px;
    height: 2560px;
    position: relative;
    background: linear-gradient(180deg, #e8f0ff 0%, #e8f0ff 83%, #1e3d8a 90%, #081540 96%, #060e30 100%);
    overflow: hidden;
  }



  /* Publisher badge — top left */
  .publisher-badge {
    position: absolute;
    top: 68px;
    left: 80px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .publisher-line {
    width: 48px;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0, 150, 255, 0.8));
  }

  .publisher-text {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    letter-spacing: 0.22em;
    color: rgba(100, 160, 255, 0.7);
    text-transform: uppercase;
  }

  /* Series tag — top right */
  .series-tag {
    position: absolute;
    top: 60px;
    right: 80px;
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    letter-spacing: 0.15em;
    color: rgba(80, 140, 255, 0.55);
    text-transform: uppercase;
    text-align: right;
  }

  /* Main title block */
  .title-block {
    position: absolute;
    top: 1200px;
    left: 80px;
    right: 80px;
  }

  .title-line1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 150px;
    line-height: 0.9;
    letter-spacing: -0.03em;
    text-transform: uppercase;
    background: linear-gradient(160deg, #4a7cc9 0%, #3a6ab8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .title-line2 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 150px;
    line-height: 0.9;
    letter-spacing: -0.03em;
    text-transform: uppercase;
    background: linear-gradient(160deg, #4a7cc9 0%, #3a6ab8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle-divider {
    display: flex;
    align-items: center;
    gap: 20px;
    margin: 36px 0 32px;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(40,100,200,0.6), rgba(40,100,200,0.15));
  }

  .divider-diamond {
    width: 8px;
    height: 8px;
    background: rgba(50, 110, 210, 0.8);
    transform: rotate(45deg);
  }

  .subtitle {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 64px;
    line-height: 1.15;
    letter-spacing: 0.01em;
    color: rgba(40, 80, 160, 0.9);
  }

  /* Feature tags */
  .feature-tags {
    position: absolute;
    top: 2060px;
    left: 80px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .tag {
    font-family: 'Space Mono', monospace;
    font-size: 19px;
    letter-spacing: 0.1em;
    padding: 8px 20px;
    border: 1px solid rgba(40, 90, 180, 0.5);
    color: rgba(30, 70, 160, 0.85);
    text-transform: uppercase;
    background: rgba(180, 210, 255, 0.25);
  }

  /* Bottom author section */
  .author-section {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 280px;
    background: linear-gradient(180deg, transparent 0%, rgba(8, 20, 60, 0.95) 40%, rgba(6, 14, 45, 1) 100%);
    display: flex;
    align-items: flex-end;
    padding: 0 80px 60px;
    justify-content: space-between;
  }

  .author-name {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 52px;
    letter-spacing: 0.04em;
    color: rgba(230, 240, 255, 1);
  }

  .author-label {
    font-family: 'Space Mono', monospace;
    font-size: 19px;
    letter-spacing: 0.18em;
    color: rgba(140, 180, 255, 0.85);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* Bottom decorative line */
  .bottom-rule {
    position: absolute;
    bottom: 280px;
    left: 80px;
    right: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(80, 150, 255, 0.7) 20%, rgba(80, 150, 255, 0.7) 80%, transparent);
  }


</style>
</head>
<body>
<div class="cover">
  <!-- Publisher badge -->
  <div class="publisher-badge">
    <div class="publisher-line"></div>
    <div class="publisher-text">In Depth</div>
  </div>

  <!-- Series tag -->
  <div class="series-tag">First Edition</div>

  <!-- Title block -->
  <div class="title-block">
    <div class="title-line1">Azure SQL</div>
    <div class="title-line2"></div>

    <div class="subtitle-divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line" style="background: linear-gradient(270deg, transparent, rgba(40,100,200,0.6));"></div>
    </div>

    <div class="subtitle">In Depth</div>
  </div>

  <!-- Feature tags -->
  <div class="feature-tags">
    <div class="tag">Hyperscale</div>
    <div class="tag">Managed Instance</div>
    <div class="tag">High Availability</div>
    <div class="tag">Migration</div>
  </div>

  <!-- Bottom rule -->
  <div class="bottom-rule"></div>

  <!-- Author section -->
  <div class="author-section">
    <div>
      <div class="author-label">Author</div>
      <div class="author-name">Mark Garner</div>
    </div>
    <!-- Decorative icon -->
    <svg width="70" height="70" viewBox="0 0 70 70" opacity="0.4">
      <polygon points="35,4 63,20 63,50 35,66 7,50 7,20"
        fill="none" stroke="rgba(80,140,255,0.8)" stroke-width="1.5"/>
      <circle cx="35" cy="35" r="12" fill="none" stroke="rgba(80,140,255,0.8)" stroke-width="1.5"/>
      <circle cx="35" cy="35" r="4" fill="rgba(80,140,255,0.5)"/>
    </svg>
  </div>
</div>
</body>
</html>
